<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortscut Pro - Watermark Edition</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #10b981; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 2rem; }
        .container { background: var(--card); padding: 2rem; border-radius: 12px; width: 90%; max-width: 650px; text-align: center; margin-bottom: 2rem; }
        .upload-area { border: 2px dashed #475569; padding: 2rem; border-radius: 8px; cursor: pointer; margin-bottom: 1.5rem; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { opacity: 0.5; }
        .results-box { background: #0f172a; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: left; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Shortscut Pro</h1>
        <p>Vertical + Marca d'água + SEO</p>
        
        <div class="upload-area" onclick="document.getElementById('videoInput').click()">
            <span id="fileLabel">📁 Selecionar Vídeo</span>
            <input type="file" id="videoInput" accept="video/*" hidden>
        </div>

        <input type="text" id="watermarkText" placeholder="Texto da Marca d'água (ex: @meucanal)">
        
        <button id="processBtn" disabled>🚀 Processar Vídeo Vertical com Marca</button>
        
        <div id="status" style="margin-top:15px; color: #94a3b8;">Pronto.</div>
        <div id="results"></div>
    </div>

    <div class="container">
        <h2>🔥 Gerador SEO</h2>
        <input type="text" id="seoTopic" placeholder="Tema do vídeo...">
        <button onclick="generateSEO()" style="background: #6366f1;">Gerar Títulos e Tags</button>
        <div id="seoResults"></div>
    </div>

    <script>
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ 
            log: true, 
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js' 
        });

        const videoInput = document.getElementById('videoInput');
        const processBtn = document.getElementById('processBtn');

        videoInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                document.getElementById('fileLabel').innerText = "✅ " + e.target.files[0].name;
                processBtn.disabled = false;
            }
        };

        processBtn.onclick = async () => {
            const file = videoInput.files[0];
            const wmText = document.getElementById('watermarkText').value || "@Shortscut";
            processBtn.disabled = true;

            if (!ffmpeg.isLoaded()) {
                document.getElementById('status').innerText = "Carregando motor...";
                await ffmpeg.load();
            }

            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));
            document.getElementById('status').innerText = "Aplicando filtros e cortando...";

            /* FILTRO EXPLICADO:
               1. crop=ih*(9/16):ih -> Deixa o vídeo vertical centralizado.
               2. drawtext -> Desenha o texto. 
                  x=(w-text_w)/2:y=h-100 -> Centralizado horizontalmente, 100px do fundo.
                  fontcolor=white:fontsize=48 -> Estética da marca.
            */
            const filter = `crop=ih*(9/16):ih,drawtext=text='${wmText}':x=(w-text_w)/2:y=h-100:fontsize=48:fontcolor=white:shadowcolor=black:shadowx=2:shadowy=2`;

            await ffmpeg.run(
                '-i', 'input.mp4',
                '-vf', filter,
                '-c:a', 'copy',
                '-segment_time', '120',
                '-f', 'segment',
                '-reset_timestamps', '1',
                'final_%03d.mp4'
            );

            document.getElementById('status').innerText = "Concluído!";
            const files = ffmpeg.FS('readdir', '/');
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            files.filter(f => f.startsWith('final_')).forEach(filename => {
                const data = ffmpeg.FS('readFile', filename);
                const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
                resultsDiv.innerHTML += `<div style="margin:10px; padding:10px; background:#334155; border-radius:5px;">
                    ${filename} <a href="${url}" download="${filename}" style="color:var(--accent); font-weight:bold; margin-left:10px;">Baixar</a>
                </div>`;
                ffmpeg.FS('unlink', filename);
            });
            processBtn.disabled = false;
        };

        function generateSEO() {
            const topic = document.getElementById('seoTopic').value;
            const titles = [`O segredo de ${topic} revelado!`, `NÃO veja este vídeo sobre ${topic} se...`];
            document.getElementById('seoResults').innerHTML = `<div class="results-box"><strong>Sugestões:</strong><br>${titles.join('<br>')}</div>`;
        }
    </script>
</body>
</html>
